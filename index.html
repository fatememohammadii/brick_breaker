<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        canvas { background: #222; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 5px; }
        #ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">Skor: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="600" height="450"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // --- SES EFEKTLERİ ---
        const hitSound = new Audio('https://actions.google.com/sounds/v1/science_fiction/low_fuzz.ogg'); 
        const breakSound = new Audio('https://actions.google.com/sounds/v1/cartoon/clime_up_short.ogg');

        // --- OYUN DEĞİŞKENLERİ ---
        let score = 0;
        let ballRadius = 8;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 3;
        let dy = -3;

        let paddleHeight = 12;
        let paddleWidth = 100;
        let paddleX = (canvas.width - paddleWidth) / 2;
        
        // Klavye kontrol değişkenleri
        let rightPressed = false;
        let leftPressed = false;

        // --- BLOK AYARLARI ---
        const brickRowCount = 5;
        const brickColumnCount = 7;
        const brickWidth = 70;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 50;
        const brickOffsetLeft = 30;

        let bricks = [];
        for(let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for(let r = 0; r < brickRowCount; r++) {
                let color = `hsl(${r * 40}, 70%, 50%)`;
                bricks[c][r] = { x: 0, y: 0, status: 1, color: color };
            }
        }

        // --- KONTROL OLAYLARI (KLAVYE VE FARE) ---
        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);
        document.addEventListener("mousemove", mouseMoveHandler, false);

        // Klavye tuşuna basıldığında
        function keyDownHandler(e) {
            if(e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = true;
            } else if(e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = true;
            }
        }

        // Klavye tuşu bırakıldığında
        function keyUpHandler(e) {
            if(e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = false;
            } else if(e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = false;
            }
        }

        // Fare hareket ettiğinde
        function mouseMoveHandler(e) {
            let relativeX = e.clientX - canvas.offsetLeft;
            if(relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        }

        // --- ÇARPIŞMA ALGORİTMASI ---
        function collisionDetection() {
            for(let c = 0; c < brickColumnCount; c++) {
                for(let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if(b.status === 1) {
                        if(x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0; // Bloğu yok et
                            score += 10;
                            scoreElement.innerText = score;
                            breakSound.play(); 
                            
                            if(score === brickRowCount * brickColumnCount * 10) {
                                alert("TEBRİKLER FATEMEHZAHRA, KAZANDINIZ!");
                                document.location.reload();
                            }
                        }
                    }
                }
            }
        }

        // --- ÇİZİM FONKSİYONLARI ---
        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI*2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight);
            ctx.fillStyle = "#0095DD";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for(let c = 0; c < brickColumnCount; c++) {
                for(let r = 0; r < brickRowCount; r++) {
                    if(bricks[c][r].status === 1) {
                        let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        // --- ANA OYUN DÖNGÜSÜ ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // Duvarlardan sekme mantığı
            if(x + dx > canvas.width - ballRadius || x < ballRadius) dx = -dx;
            if(y + dy < ballRadius) dy = -dy;
            else if(y + dy > canvas.height - ballRadius - 5) {
                if(x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                    hitSound.play(); 
                } else {
                    document.location.reload(); // Top düşünce oyunu yeniden başlat
                }
            }

            // KLAVYE HAREKET MANTIĞI: Tuşlara basılıyorsa raket hareket etsin
            if(rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7; // Sağa 7 piksel hızla git
            } else if(leftPressed && paddleX > 0) {
                paddleX -= 7; // Sola 7 piksel hızla git
            }

            x += dx;
            y += dy;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
